<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Projects</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .links { margin-top: 10px; }
        .btn { display: inline-block; margin-right: 10px; text-decoration: none; color: #0366d6; font-weight: bold; }
        .btn-pages { color: #28a745; }
    </style>
</head>
<body>
    <h1>My Repositories</h1>
    <div id="repo-grid" class="grid">Loading...</div>

    <script>
        const username = 'simplearyan'; // Change this!
        const grid = document.getElementById('repo-grid');

        async function fetchRepos() {
            try {
                const response = await fetch(`https://api.github.com/users/${username}/repos?sort=updated`);
                const repos = await response.json();
                
                grid.innerHTML = ''; // Clear loading text

                repos.forEach(repo => {
                    // GitHub Pages URL follows a standard pattern: username.github.io/repo-name
                    // Unless it is the primary username.github.io repo itself.
                    const pagesUrl = repo.has_pages 
                        ? (repo.name.toLowerCase() === `${username.toLowerCase()}.github.io` 
                            ? `https://${repo.name}/` 
                            : `https://${username}.github.io/${repo.name}/`)
                        : null;

                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <h3>${repo.name}</h3>
                        <p>${repo.description || 'No description available.'}</p>
                        <div class="links">
                            <a href="${repo.html_url}" target="_blank" class="btn">GitHub Code</a>
                            ${pagesUrl ? `<a href="${pagesUrl}" target="_blank" class="btn btn-pages">Live Demo</a>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                grid.innerHTML = 'Error loading repositories.';
                console.error(error);
            }
        }

        fetchRepos();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - simplearyan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        background: '#09090b', // zinc-950
                        surface: '#18181b', // zinc-900
                        border: '#27272a', // zinc-800
                        muted: '#a1a1aa', // zinc-400
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            background-color: #09090b;
            color: #fafafa;
            -webkit-font-smoothing: antialiased;
        }

        .minimal-card {
            background-color: transparent;
            border: 1px solid #27272a;
            transition: all 0.2s ease;
        }

        .minimal-card:hover {
            border-color: #52525b; /* zinc-600 */
            background-color: rgba(24, 24, 27, 0.4);
        }

        /* Subtle grid background pattern */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, transparent, black, transparent);
            -webkit-mask-image: linear-gradient(to bottom, black 20%, transparent 100%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
    </style>
</head>
<body class="selection:bg-zinc-800 selection:text-white">

    <!-- Elegant subtle background -->
    <div class="fixed inset-0 z-[-1] pointer-events-none bg-grid opacity-30"></div>

    <main class="max-w-4xl mx-auto px-6 py-20 min-h-screen flex flex-col">
        
        <!-- Profile Header (Personal Touch) -->
        <header class="mb-16">
            <div class="flex flex-col md:flex-row items-start md:items-center gap-6">
                <!-- Fetching Avatar from GitHub -->
                <img id="profile-avatar" src="https://github.com/identicons/simplearyan.png" alt="Profile" class="w-24 h-24 rounded-full border border-border object-cover bg-surface shadow-lg">
                <div class="flex-1">
                    <h1 id="profile-name" class="text-3xl font-bold tracking-tight mb-1 text-zinc-100">Loading Profile...</h1>
                    <p id="profile-username" class="text-zinc-500 font-medium mb-3">@simplearyan</p>
                    <p id="profile-bio" class="text-zinc-400 max-w-xl leading-relaxed text-sm">
                        Developer & Designer. Exploring aesthetic minimal interfaces and open-source tooling.
                    </p>
                </div>
                <!-- Search -->
                <div class="relative w-full md:w-64 mt-6 md:mt-0">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 w-4 h-4"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Search projects..." 
                        class="w-full pl-10 pr-4 py-2 bg-surface/50 border border-border rounded-lg text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 transition-all shadow-inner"
                    >
                </div>
            </div>
            
            <div class="mt-10 flex items-center justify-between text-xs font-mono text-zinc-500 tracking-widest border-b border-border pb-4">
                <div class="flex gap-4">
                    <span class="uppercase">Projects <span id="repo-count" class="text-zinc-300 ml-1">0</span></span>
                </div>
                <span class="flex items-center gap-1.5 uppercase">Status: <span id="data-source" class="text-zinc-300 flex items-center gap-1"><i data-lucide="refresh-cw" class="w-3 h-3 animate-spin"></i> Load</span></span>
            </div>
        </header>

        <!-- Grid Container -->
        <div id="repo-grid" class="flex-grow grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Skeletons -->
            <div class="h-40 rounded-xl border border-border bg-surface/30 animate-pulse"></div>
            <div class="h-40 rounded-xl border border-border bg-surface/30 animate-pulse"></div>
            <div class="h-40 rounded-xl border border-border bg-surface/30 animate-pulse hidden md:block"></div>
            <div class="h-40 rounded-xl border border-border bg-surface/30 animate-pulse hidden md:block"></div>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="hidden text-center py-20 border border-dashed border-border rounded-xl mt-4">
            <p class="text-zinc-500 text-sm">No matching projects found.</p>
        </div>

        <footer class="mt-20 border-t border-border pt-8 flex flex-col sm:flex-row justify-between items-center gap-4 text-zinc-500 text-sm">
            <p>© <span id="current-year"></span> simplearyan.</p>
            <div class="flex items-center gap-6">
                <a href="https://github.com/simplearyan" class="hover:text-zinc-300 transition-colors flex items-center gap-1.5">
                    <i data-lucide="github" class="w-4 h-4"></i> GitHub
                </a>
            </div>
        </footer>
    </main>

    <script>
        const GITHUB_USERNAME = "simplearyan"; 
        const DATA_FILE_URL = "../repos.json"; 
        const CACHE_EXPIRY = 3600000; 

        let allRepos = [];
        const grid = document.getElementById('repo-grid');
        const searchInput = document.getElementById('search-input');
        const repoCount = document.getElementById('repo-count');
        const dataSourceLabel = document.getElementById('data-source');
        
        document.getElementById('current-year').textContent = new Date().getFullYear();

        document.addEventListener('DOMContentLoaded', () => {
            initLucide();
            fetchUserProfile();
            fetchFlow();
        });

        function initLucide() {
            lucide.createIcons();
        }

        async function fetchUserProfile() {
            try {
                // Personal Touch: Fetch user's real GitHub profile data
                const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}`);
                if (res.ok) {
                    const user = await res.json();
                    if(user.avatar_url) document.getElementById('profile-avatar').src = user.avatar_url;
                    if(user.name) document.getElementById('profile-name').textContent = user.name;
                    else document.getElementById('profile-name').textContent = user.login;
                    document.getElementById('profile-username').textContent = `@${user.login}`;
                    if(user.bio) document.getElementById('profile-bio').textContent = user.bio;
                }
            } catch (e) {
                document.getElementById('profile-name').textContent = GITHUB_USERNAME;
            }
        }

        async function fetchFlow() {
            const cacheKey = `gh_cache_${GITHUB_USERNAME}`;
            const cached = localStorage.getItem(cacheKey);
            
            if (cached) {
                const { data, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp < CACHE_EXPIRY) {
                    updateUI(data, "Live");
                    revalidateInBackground(cacheKey);
                    return;
                }
            }

            try {
                const res = await fetch(DATA_FILE_URL);
                if (res.ok) {
                    const data = await res.json();
                    const formatted = formatData(data);
                    saveCache(cacheKey, formatted);
                    updateUI(formatted, "Static");
                    return;
                }
            } catch (e) {}

            fetchLive(cacheKey);
        }

        async function fetchLive(cacheKey) {
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=100`);
                if (!res.ok) throw new Error("API error");
                const data = await res.json();
                const formatted = formatData(data);
                saveCache(cacheKey, formatted);
                updateUI(formatted, "OK");
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full py-10 border border-red-900/50 bg-red-900/10 text-red-400 text-center rounded-xl text-sm">Could not load projects.</div>`;
                dataSourceLabel.innerHTML = `<i data-lucide="x-circle" class="w-3 h-3 text-red-400"></i> Error`;
                initLucide();
            }
        }

        async function revalidateInBackground(cacheKey) {
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=100`);
                if (res.ok) {
                    const data = await res.json();
                    saveCache(cacheKey, formatData(data));
                }
            } catch(e) {}
        }

        function formatData(data) {
            return data
                .filter(repo => !repo.fork)
                .map(repo => ({
                    id: repo.id,
                    name: repo.name,
                    description: repo.description,
                    stars: repo.stargazers_count,
                    forks: repo.forks_count,
                    language: repo.language,
                    url: repo.html_url,
                    pages: repo.homepage || (repo.has_pages ? `https://${GITHUB_USERNAME}.github.io/${repo.name}/` : null),
                    topics: repo.topics || []
                }));
        }

        function saveCache(key, data) {
            localStorage.setItem(key, JSON.stringify({ data, timestamp: Date.now() }));
        }

        function updateUI(data, statusText) {
            allRepos = data;
            dataSourceLabel.innerHTML = `<i data-lucide="check-circle" class="w-3 h-3 text-emerald-400"></i> ${statusText}`;
            renderRepos(allRepos);
        }

        function renderRepos(repos) {
            grid.innerHTML = '';
            repoCount.textContent = repos.length;
            
            if (repos.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
            }

            repos.forEach(repo => {
                const card = document.createElement('div');
                card.className = "minimal-card rounded-xl p-5 flex flex-col group";
                
                const description = repo.description ? repo.description : `<span class="italic text-zinc-600">No description provided</span>`;

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <a href="${repo.url}" target="_blank" class="text-base font-semibold text-zinc-100 group-hover:text-blue-400 transition-colors flex items-center gap-2">
                            <i data-lucide="book-marked" class="w-4 h-4 text-zinc-500 group-hover:text-blue-400 transition-colors"></i>
                            ${repo.name}
                        </a>
                        ${repo.pages ? `
                        <a href="${repo.pages}" target="_blank" class="p-1 text-zinc-500 hover:text-green-400 transition-colors bg-surface/50 rounded-md hover:bg-surface border border-transparent hover:border-border" title="Live Preview">
                            <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                        </a>` : `
                        <a href="${repo.url}" target="_blank" class="p-1 text-zinc-500 hover:text-zinc-300 transition-colors bg-surface/50 rounded-md hover:bg-surface border border-transparent hover:border-border" title="Repository">
                            <i data-lucide="github" class="w-4 h-4"></i>
                        </a>`}
                    </div>

                    <p class="text-zinc-400 text-sm leading-relaxed mb-6 flex-grow line-clamp-2">
                        ${description}
                    </p>

                    <div class="flex items-center justify-between text-xs text-zinc-500 mt-auto font-medium">
                        <div class="flex items-center gap-4">
                            ${repo.language ? `<span class="flex items-center gap-1.5"><span class="w-2 h-2 rounded-full bg-zinc-500"></span>${repo.language}</span>` : ''}
                            ${repo.stars > 0 ? `<span class="flex items-center gap-1 cursor-default hover:text-zinc-300 transition-colors"><i data-lucide="star" class="w-3.5 h-3.5"></i> ${repo.stars}</span>` : ''}
                        </div>
                        ${repo.topics.length > 0 ? `<div class="px-2 py-0.5 bg-surface border border-border rounded text-[10px] tracking-wider uppercase text-zinc-400">${repo.topics[0]}</div>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
            initLucide();
        }

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const term = e.target.value.toLowerCase();
                const filtered = allRepos.filter(r => 
                    r.name.toLowerCase().includes(term) || 
                    (r.description && r.description.toLowerCase().includes(term)) ||
                    (r.language && r.language.toLowerCase().includes(term))
                );
                renderRepos(filtered);
            }, 200);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - simplearyan</title>
    
    <script>
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"DM Sans"', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    }
                }
            }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600&family=Outfit:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        body {
            -webkit-font-smoothing: antialiased;
        }

        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(0, 0, 0, 0.04) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(0, 0, 0, 0.04) 1px, transparent 1px);
            mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%);
        }
        
        .dark .bg-grid {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #52525b; }
        
        /* Unique Accent line on cards */
        .repo-card {
            position: relative;
        }
        .repo-card::before {
            content: "";
            position: absolute;
            top: -1px; left: 24px; right: 24px;
            height: 2px;
            background: var(--card-accent, transparent);
            border-bottom-left-radius: 4px;
            border-bottom-right-radius: 4px;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(-2px);
        }
        .repo-card:hover::before {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-[#fafafa] text-zinc-800 dark:bg-[#09090b] dark:text-zinc-100 selection:bg-blue-200 dark:selection:bg-blue-900 transition-colors duration-300">

    <div class="fixed inset-0 z-[-1] pointer-events-none bg-grid opacity-100 dark:opacity-40 transition-opacity"></div>

    <main class="max-w-5xl mx-auto px-6 py-12 md:py-20 min-h-screen flex flex-col">
        
        <header class="mb-14">
            <div class="flex justify-end mb-8">
                <button id="theme-toggle" class="p-2.5 rounded-full bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-zinc-100 shadow-sm hover:shadow transition-all focus:outline-none focus:ring-2 focus:ring-zinc-400 dark:focus:ring-zinc-600">
                    <i id="theme-icon" data-lucide="moon" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="flex flex-col-reverse md:flex-row md:items-center justify-between gap-8">
                <div class="max-w-xl">
                    <h1 id="profile-name" class="font-display text-4xl md:text-5xl font-bold tracking-tight text-zinc-900 dark:text-white mb-3">
                        Loading...
                    </h1>
                    <p id="profile-username" class="font-mono text-blue-600 dark:text-blue-400 font-medium mb-5 text-sm">@simplearyan</p>
                    <p id="profile-bio" class="text-lg text-zinc-600 dark:text-zinc-400 leading-relaxed mb-8">
                        Developer & Designer. Exploring aesthetic minimal interfaces and open-source tooling.
                    </p>
                    <div class="flex items-center gap-5 text-zinc-500 dark:text-zinc-400">
                        <a href="https://github.com/simplearyan" target="_blank" class="hover:text-zinc-900 dark:hover:text-white hover:-translate-y-0.5 transition-all flex items-center gap-2 text-sm font-medium">
                            <i data-lucide="github" class="w-5 h-5"></i>
                            <span class="hidden sm:inline">GitHub</span>
                        </a>
                    </div>
                </div>
                
                <div class="relative shrink-0">
                    <div class="w-28 h-28 md:w-36 md:h-36 rounded-full overflow-hidden border-4 border-white dark:border-zinc-900 shadow-xl bg-white dark:bg-zinc-900">
                        <img id="profile-avatar" src="https://github.com/identicons/simplearyan.png" alt="Profile" class="w-full h-full object-cover">
                    </div>
                </div>
            </div>
            
            <div class="mt-16 flex flex-col md:flex-row items-start md:items-center justify-between gap-6 border-b border-zinc-200 dark:border-zinc-800/80 pb-6">
                <div class="flex items-center gap-4 text-sm font-medium text-zinc-500 dark:text-zinc-400">
                    <span class="text-zinc-900 dark:text-zinc-100 font-display text-lg">Projects <span id="repo-count" class="ml-1.5 px-2.5 py-0.5 bg-zinc-100 dark:bg-zinc-800 rounded-lg text-xs border border-zinc-200 dark:border-zinc-700 font-mono text-zinc-600 dark:text-zinc-400">0</span></span>
                    <span class="opacity-30">|</span>
                    <span class="flex items-center gap-2 text-xs uppercase tracking-wider" id="data-source-container"><i data-lucide="refresh-cw" class="w-3.5 h-3.5 animate-spin"></i> <span id="data-source">Syncing</span></span>
                </div>
                
                <div class="relative w-full md:w-72">
                    <i data-lucide="search" class="absolute left-3.5 top-1/2 -translate-y-1/2 text-zinc-400 w-4 h-4"></i>
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Search repositories..." 
                        class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-zinc-900/50 border border-zinc-200 dark:border-zinc-800 rounded-xl text-sm text-zinc-900 dark:text-zinc-100 placeholder-zinc-400 focus:outline-none focus:border-blue-500 dark:focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all shadow-sm"
                    >
                </div>
            </div>
        </header>

        <!-- Grid Container -->
        <div id="repo-grid" class="flex-grow grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Skeletons -->
            <div class="h-56 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900/50 animate-pulse"></div>
            <div class="h-56 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900/50 animate-pulse"></div>
            <div class="h-56 rounded-2xl border border-zinc-200 dark:border-zinc-800 bg-white dark:bg-zinc-900/50 animate-pulse hidden md:block"></div>
        </div>

        <div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 border border-dashed border-zinc-300 dark:border-zinc-800 rounded-2xl mt-4 bg-white/50 dark:bg-transparent">
            <i data-lucide="folder-search" class="w-10 h-10 text-zinc-300 dark:text-zinc-700 mb-4"></i>
            <p class="text-zinc-500 text-sm">No matching projects found.</p>
        </div>

        <footer class="mt-20 pt-8 border-t border-zinc-200 dark:border-zinc-800 flex flex-col sm:flex-row justify-between items-center gap-4 text-zinc-400 text-sm">
            <p>© <span id="current-year"></span> simplearyan.</p>
        </footer>
    </main>

    <script>
        const GITHUB_USERNAME = "simplearyan"; 
        const DATA_FILE_URL = "../repos.json"; 
        const CACHE_EXPIRY = 3600000; 

        let allRepos = [];
        const grid = document.getElementById('repo-grid');
        const searchInput = document.getElementById('search-input');
        const repoCount = document.getElementById('repo-count');
        const dataSourceContainer = document.getElementById('data-source-container');
        
        document.getElementById('current-year').textContent = new Date().getFullYear();

        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');

        function updateThemeIcon() {
            if (document.documentElement.classList.contains('dark')) {
                themeIcon.setAttribute('data-lucide', 'sun');
            } else {
                themeIcon.setAttribute('data-lucide', 'moon');
            }
            if (window.lucide) lucide.createIcons({ icons: { sun: lucide.icons.Sun, moon: lucide.icons.Moon }, nameAttr: 'data-lucide' });
        }
        
        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if (document.documentElement.classList.contains('dark')) {
                localStorage.theme = 'dark';
            } else {
                localStorage.theme = 'light';
            }
            updateThemeIcon();
        });

        document.addEventListener('DOMContentLoaded', () => {
            initLucide();
            updateThemeIcon();
            fetchUserProfile();
            fetchFlow();
        });

        function initLucide() {
            lucide.createIcons();
        }

        async function fetchUserProfile() {
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}`);
                if (res.ok) {
                    const user = await res.json();
                    if(user.avatar_url) document.getElementById('profile-avatar').src = user.avatar_url;
                    if(user.name) document.getElementById('profile-name').textContent = user.name;
                    else document.getElementById('profile-name').textContent = user.login;
                    document.getElementById('profile-username').textContent = `@${user.login}`;
                    if(user.bio) document.getElementById('profile-bio').textContent = user.bio;
                }
            } catch (e) {
                document.getElementById('profile-name').textContent = GITHUB_USERNAME;
            }
        }

        async function fetchFlow() {
            const cacheKey = `gh_cache_${GITHUB_USERNAME}`;
            const cached = localStorage.getItem(cacheKey);
            
            if (cached) {
                const { data, timestamp } = JSON.parse(cached);
                if (Date.now() - timestamp < CACHE_EXPIRY) {
                    updateUI(data, "Live");
                    revalidateInBackground(cacheKey);
                    return;
                }
            }

            try {
                const res = await fetch(DATA_FILE_URL);
                if (res.ok) {
                    const data = await res.json();
                    const formatted = formatData(data);
                    saveCache(cacheKey, formatted);
                    updateUI(formatted, "Static");
                    return;
                }
            } catch (e) {}

            fetchLive(cacheKey);
        }

        async function fetchLive(cacheKey) {
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=100`);
                if (!res.ok) throw new Error("API error");
                const data = await res.json();
                const formatted = formatData(data);
                saveCache(cacheKey, formatted);
                updateUI(formatted, "Live Data");
            } catch (err) {
                grid.innerHTML = `<div class="col-span-full py-10 border border-red-900/50 bg-red-50 dark:bg-red-900/10 text-red-600 dark:text-red-400 text-center rounded-2xl text-sm">Could not load projects.</div>`;
                dataSourceContainer.innerHTML = `<i data-lucide="x-circle" class="w-3.5 h-3.5 text-red-500"></i> <span class="text-red-500 font-bold tracking-wide text-xs uppercase">Error</span>`;
                initLucide();
            }
        }

        async function revalidateInBackground(cacheKey) {
            try {
                const res = await fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=100`);
                if (res.ok) {
                    const data = await res.json();
                    saveCache(cacheKey, formatData(data));
                }
            } catch(e) {}
        }

        function formatData(data) {
            return data
                .filter(repo => !repo.fork)
                .map(repo => ({
                    id: repo.id,
                    name: repo.name,
                    description: repo.description,
                    stars: repo.stargazers_count,
                    forks: repo.forks_count,
                    language: repo.language,
                    url: repo.html_url,
                    pages: repo.homepage || (repo.has_pages ? `https://${GITHUB_USERNAME}.github.io/${repo.name}/` : null),
                    topics: repo.topics || []
                }));
        }

        function saveCache(key, data) {
            localStorage.setItem(key, JSON.stringify({ data, timestamp: Date.now() }));
        }

        function updateUI(data, statusText) {
            allRepos = data;
            dataSourceContainer.innerHTML = `<i data-lucide="check-circle" class="w-3.5 h-3.5 text-emerald-500"></i> <span class="text-emerald-600 dark:text-emerald-400 font-bold tracking-wide text-xs uppercase">${statusText}</span>`;
            renderRepos(allRepos);
        }

        // --- DESIGN ENHANCEMENTS: Colors & Icons ---
        const languageMap = {
            'JavaScript': { color: '#f5df4d', bg: 'bg-yellow-400/10', text: 'text-yellow-600 dark:text-yellow-400', border: 'border-yellow-400/20', icon: 'file-json-2' },
            'TypeScript': { color: '#3178c6', bg: 'bg-blue-500/10', text: 'text-blue-600 dark:text-blue-400', border: 'border-blue-500/20', icon: 'file-type-2' },
            'HTML': { color: '#e34c26', bg: 'bg-orange-500/10', text: 'text-orange-600 dark:text-orange-400', border: 'border-orange-500/20', icon: 'globe-2' },
            'CSS': { color: '#1572b6', bg: 'bg-sky-500/10', text: 'text-sky-600 dark:text-sky-400', border: 'border-sky-500/20', icon: 'palette' },
            'Python': { color: '#306998', bg: 'bg-emerald-500/10', text: 'text-emerald-600 dark:text-emerald-400', border: 'border-emerald-500/20', icon: 'terminal-square' },
            'Java': { color: '#b07219', bg: 'bg-red-500/10', text: 'text-red-600 dark:text-red-400', border: 'border-red-500/20', icon: 'coffee' },
            'Shell': { color: '#89e051', bg: 'bg-green-500/10', text: 'text-green-600 dark:text-green-400', border: 'border-green-500/20', icon: 'terminal' },
            'Astro': { color: '#ff5a03', bg: 'bg-orange-600/10', text: 'text-orange-700 dark:text-orange-500', border: 'border-orange-600/20', icon: 'rocket' },
            'Vue': { color: '#41b883', bg: 'bg-emerald-500/10', text: 'text-emerald-600 dark:text-emerald-400', border: 'border-emerald-500/20', icon: 'hexagon' },
            'Rust': { color: '#dea584', bg: 'bg-orange-400/10', text: 'text-orange-600 dark:text-orange-400', border: 'border-orange-400/20', icon: 'cog' },
            'Markdown': { color: '#ffffff', bg: 'bg-zinc-500/10', text: 'text-zinc-600 dark:text-zinc-400', border: 'border-zinc-500/20', icon: 'file-text' }
        };

        const defaultTheme = { color: '#8b5cf6', bg: 'bg-indigo-500/10', text: 'text-indigo-600 dark:text-indigo-400', border: 'border-indigo-500/20', icon: 'folder-code' };

        function renderRepos(repos) {
            grid.innerHTML = '';
            repoCount.textContent = repos.length;
            
            if (repos.length === 0) {
                document.getElementById('empty-state').classList.remove('hidden');
            } else {
                document.getElementById('empty-state').classList.add('hidden');
            }

            repos.forEach(repo => {
                const card = document.createElement('div');
                const theme = languageMap[repo.language] || defaultTheme;
                
                // Add unique accent line color
                card.style.setProperty('--card-accent', `linear-gradient(to right, ${theme.color}, transparent)`);
                card.className = "repo-card group relative bg-white dark:bg-zinc-900/40 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 flex flex-col transition-all duration-300 hover:-translate-y-1.5 hover:border-zinc-300 dark:hover:border-zinc-600 shadow-sm hover:shadow-xl hover:shadow-[var(--card-accent)]/5 dark:shadow-none dark:hover:shadow-[0_10px_30px_-15px_rgba(0,0,0,0.5)]";
                
                const description = repo.description ? repo.description : `<span class="italic text-zinc-400 dark:text-zinc-600">No description provided</span>`;

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-5">
                        <div class="w-12 h-12 rounded-xl flex flex-shrink-0 items-center justify-center border transition-colors ${theme.bg} ${theme.text} ${theme.border} group-hover:scale-110 duration-300 shadow-inner">
                            <i data-lucide="${theme.icon}" class="w-6 h-6"></i>
                        </div>
                        <div class="flex gap-1 text-zinc-400 dark:text-zinc-500 mt-1">
                            <a href="${repo.url}" target="_blank" class="p-2 hover:text-zinc-900 dark:hover:text-zinc-100 transition-colors bg-transparent border border-transparent hover:border-zinc-200 dark:hover:border-zinc-700 hover:bg-zinc-50 dark:hover:bg-zinc-800 rounded-lg" title="Repository">
                                <i data-lucide="github" class="w-4.5 h-4.5"></i>
                            </a>
                            ${repo.pages ? `
                            <a href="${repo.pages}" target="_blank" class="p-2 hover:text-blue-600 dark:hover:text-blue-400 transition-colors bg-transparent border border-transparent hover:border-blue-200 dark:hover:border-blue-900/50 hover:bg-blue-50 dark:hover:bg-blue-900/20 rounded-lg" title="Live Preview">
                                <i data-lucide="external-link" class="w-4.5 h-4.5"></i>
                            </a>` : ``}
                        </div>
                    </div>

                    <h3 class="font-display text-xl font-bold text-zinc-900 dark:text-zinc-100 mb-2 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                        ${repo.name}
                    </h3>
                    
                    <p class="text-zinc-600 dark:text-zinc-400 text-sm leading-relaxed mb-6 flex-grow line-clamp-3">
                        ${description}
                    </p>

                    <div class="flex items-center justify-between text-sm font-medium text-zinc-500 dark:text-zinc-400 mt-auto pt-5 border-t border-zinc-100 dark:border-zinc-800/80">
                        <div class="flex items-center gap-4">
                            ${repo.language ? `<span class="flex items-center gap-2 font-mono text-xs text-zinc-900 dark:text-zinc-300"><span class="w-2.5 h-2.5 rounded-full shadow-[0_0_8px_currentColor]" style="background-color: ${theme.color}; color: ${theme.color}"></span>${repo.language}</span>` : ''}
                            ${repo.stars > 0 ? `<span class="flex items-center gap-1.5 hover:text-amber-500 dark:hover:text-amber-400 transition-colors"><i data-lucide="star" class="w-4 h-4 text-zinc-400 dark:text-zinc-600 group-hover:fill-amber-400/20 group-hover:text-amber-500 dark:group-hover:text-amber-400"></i> ${repo.stars}</span>` : ''}
                        </div>
                        ${repo.topics.length > 0 ? `<div class="px-2.5 py-1 bg-zinc-100 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 text-zinc-600 dark:text-zinc-300 rounded-md text-[10px] font-bold tracking-widest uppercase truncate max-w-[80px]">${repo.topics[0]}</div>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
            initLucide();
        }

        let searchTimeout;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const term = e.target.value.toLowerCase();
                const filtered = allRepos.filter(r => 
                    r.name.toLowerCase().includes(term) || 
                    (r.description && r.description.toLowerCase().includes(term)) ||
                    (r.language && r.language.toLowerCase().includes(term))
                );
                renderRepos(filtered);
            }, 200);
        });
    </script>
</body>
</html>

name: Update Data & Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 * * * *'  # Refresh repos.json every hour
  push:
    branches: [main]     # Deploy on every push
  workflow_dispatch:     # Manual trigger

jobs:

  # ── Job 1: Fetch fresh repo data and commit back to main ────────────────────
  update-data:
    name: Fetch GitHub API Data
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch repos from GitHub API
        run: |
          curl -s \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/users/simplearyan/repos?sort=updated&per_page=100" \
            > repos.json

      - name: Commit updated repos.json (if changed)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated update of repos.json [skip ci]"
          file_pattern: repos.json
          branch: main

  # ── Job 2: Deploy the site to GitHub Pages ──────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: update-data   # Wait for fresh repos.json before deploying
    
    permissions:
      contents: read
      pages: write
      id-token: write

    concurrency:
      group: "pages"
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository (with latest repos.json)
        uses: actions/checkout@v4
        with:
          ref: main   # Ensure we get the commit from update-data job

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4